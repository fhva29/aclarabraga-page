<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fdf6f9;
      color: #2d2d2d;
      min-height: 100vh;
    }

    /* ---- Login ---- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(242,92,138,.12);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #F25C8A;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: .9rem;
      color: #888;
      margin-bottom: 28px;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #f0d0dd;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 14px;
    }

    .login-card input[type="password"]:focus { border-color: #F25C8A; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #F25C8A;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-primary:hover { background: #d94a78; }
    .btn-primary:disabled,
    .btn-add:disabled,
    .btn-sm:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .login-error {
      color: #e05;
      font-size: .85rem;
      margin-top: 10px;
      min-height: 20px;
    }

    /* ---- Admin screen ---- */
    #admin-screen { display: none; }

    header {
      background: #fff;
      border-bottom: 1.5px solid #f0d0dd;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #F25C8A;
    }

    .btn-ghost {
      background: none;
      border: 1.5px solid #F25C8A;
      color: #F25C8A;
      border-radius: 8px;
      padding: 7px 16px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-ghost:hover { background: #F25C8A; color: #fff; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .btn-add {
      background: #F25C8A;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-add:hover { background: #d94a78; }

    /* ---- Table ---- */
    .table-wrap {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(242,92,138,.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .92rem;
    }

    thead th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 800;
      font-size: .82rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1.5px solid #f8eaf1;
    }

    tbody tr { border-bottom: 1px solid #fdf0f5; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 13px 16px;
      vertical-align: middle;
    }

    .slug-badge {
      font-weight: 700;
      color: #F25C8A;
      background: #fdf0f5;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: .85rem;
    }

    .cat-badge {
      font-size: .8rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .cat-produto { background: #e8f4fd; color: #2980b9; }
    .cat-cupom   { background: #fef3cd; color: #b07d00; }

    .status-badge {
      font-size: .8rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .status-active   { background: #e6f9f0; color: #1a8c56; }
    .status-inactive { background: #fdecea; color: #c0392b; }

    .clicks-num {
      font-weight: 700;
      color: #2d2d2d;
    }

    .actions { display: flex; gap: 8px; }

    .btn-sm {
      padding: 5px 12px;
      border-radius: 7px;
      font-family: inherit;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid;
      transition: all .15s;
    }

    .btn-edit {
      border-color: #F25C8A;
      color: #F25C8A;
      background: none;
    }

    .btn-edit:hover { background: #F25C8A; color: #fff; }

    .btn-deactivate {
      border-color: #c0392b;
      color: #c0392b;
      background: none;
    }

    .btn-deactivate:hover { background: #c0392b; color: #fff; }

    .btn-activate {
      border-color: #1a8c56;
      color: #1a8c56;
      background: none;
    }

    .btn-activate:hover { background: #1a8c56; color: #fff; }

    .btn-delete {
      border-color: #888;
      color: #888;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
    }

    .btn-delete:hover { background: #c0392b; border-color: #c0392b; color: #fff; }

    .btn-delete svg { display: block; }

    /* ---- Confirm dialog ---- */
    #confirm-dialog {
      border: none;
      border-radius: 16px;
      padding: 0;
      box-shadow: 0 8px 40px rgba(0,0,0,.22);
      width: 100%;
      max-width: 380px;
    }

    #confirm-dialog::backdrop { background: rgba(0,0,0,.45); }

    .confirm-body {
      padding: 32px 28px 24px;
      text-align: center;
    }

    .confirm-icon {
      width: 52px;
      height: 52px;
      background: #fdecea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .confirm-icon svg { color: #c0392b; }

    .confirm-body h3 {
      font-size: 1.05rem;
      font-weight: 800;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .confirm-body p {
      font-size: .9rem;
      color: #777;
      line-height: 1.5;
    }

    .confirm-body p strong { color: #2d2d2d; }

    .confirm-footer {
      padding: 0 28px 28px;
      display: flex;
      gap: 10px;
    }

    .btn-confirm-cancel {
      flex: 1;
      background: none;
      border: 1.5px solid #ddd;
      color: #666;
      border-radius: 9px;
      padding: 11px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-confirm-cancel:hover { border-color: #aaa; color: #333; }

    .btn-confirm-delete {
      flex: 1;
      background: #c0392b;
      border: none;
      color: #fff;
      border-radius: 9px;
      padding: 11px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-confirm-delete:hover { background: #a93226; }
    .btn-confirm-delete:disabled { opacity: .6; cursor: not-allowed; }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-style: italic;
    }

    /* ---- Modal ---- */
    dialog {
      border: none;
      border-radius: 16px;
      padding: 0;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      width: 100%;
      max-width: 480px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }

    dialog::backdrop { background: rgba(0,0,0,.4); }

    .modal-header {
      padding: 22px 24px 16px;
      border-bottom: 1.5px solid #f0d0dd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #F25C8A;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #aaa;
      line-height: 1;
    }

    .modal-close:hover { color: #F25C8A; }

    .modal-body { padding: 20px 24px; }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #f0d0dd;
      border-radius: 9px;
      font-family: inherit;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: #F25C8A; }

    .form-group input:disabled { background: #fdf6f9; color: #aaa; }

    .modal-footer {
      padding: 16px 24px 22px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: none;
      border: 1.5px solid #ddd;
      color: #888;
      border-radius: 9px;
      padding: 10px 20px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-cancel:hover { border-color: #aaa; color: #555; }

    .form-error {
      color: #e05;
      font-size: .83rem;
      margin-top: 8px;
      min-height: 18px;
    }

    /* ---- Icon picker ---- */
    .icon-picker {
      border: 1.5px solid #f0d0dd;
      border-radius: 9px;
      padding: 10px;
      background: #fff;
    }

    .icon-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 1.5px solid transparent;
      border-radius: 8px;
      background: #fdf6f9;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      line-height: 1;
    }

    .icon-btn:hover { background: #f8eaf1; border-color: #F25C8A; }
    .icon-btn.selected { background: #F25C8A22; border-color: #F25C8A; }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .container { padding: 18px 12px; }
      table { font-size: .82rem; }
      thead th, tbody td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<section id="login-screen">
  <div class="login-card">
    <h1>Clara Admin</h1>
    <p>Acesso restrito — insira a senha para continuar</p>
    <input type="password" id="password-input" placeholder="Senha" autocomplete="current-password" />
    <button class="btn-primary" id="login-btn">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</section>

<!-- ===== ADMIN ===== -->
<section id="admin-screen">
  <header>
    <h1>✦ Clara Admin</h1>
    <button class="btn-ghost" id="logout-btn">Sair</button>
  </header>

  <div class="container">
    <div class="toolbar">
      <button class="btn-add" id="new-link-btn">+ Novo Link</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Slug</th>
            <th>Título</th>
            <th>Categoria</th>
            <th>Status</th>
            <th>Cliques</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="links-tbody">
          <tr class="empty-row"><td colspan="6">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</section>

<!-- ===== MODAL ===== -->
<dialog id="link-modal">
  <div class="modal-header">
    <h2 id="modal-title">Novo Link</h2>
    <button class="modal-close" id="modal-close-btn" type="button">&#215;</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label for="field-slug">Slug <small style="color:#aaa">(ex: whey)</small></label>
      <input type="text" id="field-slug" placeholder="whey" />
    </div>
    <div class="form-group">
      <label for="field-title">Título</label>
      <input type="text" id="field-title" placeholder="Whey Protein" />
    </div>
    <div class="form-group">
      <label for="field-description">Descrição <small style="color:#aaa">(opcional)</small></label>
      <input type="text" id="field-description" placeholder="Descrição curta" />
    </div>
    <div class="form-group">
      <label for="field-url">URL de destino</label>
      <input type="url" id="field-url" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label for="field-coupon">Cupom <small style="color:#aaa">(opcional)</small></label>
      <input type="text" id="field-coupon" placeholder="CLARA10" />
    </div>
    <div class="form-group">
      <label>Ícone</label>
      <div class="icon-picker">
        <div class="icon-grid" id="icon-grid"></div>
        <input type="hidden" id="field-icon" value="" />
      </div>
    </div>
    <div class="form-group">
      <label for="field-category">Categoria</label>
      <select id="field-category">
        <option value="produto">Produto</option>
        <option value="cupom">Cupom</option>
      </select>
    </div>
    <div class="form-error" id="modal-error"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" id="modal-cancel-btn" type="button">Cancelar</button>
    <button class="btn-primary" id="modal-save-btn" type="button" style="width:auto;padding:10px 24px">Salvar</button>
  </div>
</dialog>

<!-- ===== CONFIRM DELETE DIALOG ===== -->
<dialog id="confirm-dialog">
  <div class="confirm-body">
    <div class="confirm-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </div>
    <h3>Excluir link?</h3>
    <p>O link <strong id="confirm-slug-label"></strong> será removido permanentemente. Esta ação não pode ser desfeita.</p>
  </div>
  <div class="confirm-footer">
    <button class="btn-confirm-cancel" id="confirm-cancel-btn" type="button">Cancelar</button>
    <button class="btn-confirm-delete" id="confirm-delete-btn" type="button">Excluir</button>
  </div>
</dialog>

<script>
  // ---- State ----
  let editingLinkId = null;
  let cachedLinks = [];

  // ---- Icon picker ----
  const ICONS = [
    '🥛','💊','✨','⚡','🏋️','🏃','🧘','🥗','🍎','🥑',
    '🧃','💧','🫐','🍋','🥦','🐟','🍗','🥚','🧂','🫚',
    '🏅','🎽','👟','⌚','🎧','📦','🛍️','🏷️','💰','🎁',
    '💪','🔥','❤️','⭐','🌟','✅','🆕','📣','🎯','🧡',
  ];

  (function buildIconGrid() {
    const grid = document.getElementById('icon-grid');
    ICONS.forEach(function(emoji) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'icon-btn';
      btn.textContent = emoji;
      btn.dataset.emoji = emoji;
      btn.addEventListener('click', function() {
        document.querySelectorAll('.icon-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        document.getElementById('field-icon').value = emoji;
      });
      grid.appendChild(btn);
    });
  })();

  function setIconPicker(emoji) {
    document.getElementById('field-icon').value = emoji || '';
    document.querySelectorAll('.icon-btn').forEach(function(btn) {
      btn.classList.toggle('selected', btn.dataset.emoji === emoji);
    });
  }

  // ---- Auth ----
  function authHeader() {
    const token = sessionStorage.getItem('admin_token');
    return token ? { 'Authorization': 'Basic ' + token } : {};
  }

  function saveToken(password) {
    sessionStorage.setItem('admin_token', btoa('admin:' + password));
  }

  function clearToken() {
    sessionStorage.removeItem('admin_token');
  }

  function showLogin(errorMsg) {
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-error').textContent = errorMsg || '';
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
  }

  // ---- Login flow ----
  async function attemptLogin() {
    const password = document.getElementById('password-input').value.trim();
    if (!password) return;
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Entrando…';
    saveToken(password);
    try {
      const res = await fetch('/api/admin/links', { headers: authHeader() });
      if (res.status === 401) { clearToken(); showLogin('Senha incorreta.'); return; }
      if (!res.ok) { clearToken(); showLogin('Erro ao conectar. Tente novamente.'); return; }
      const links = await res.json();
      showAdmin();
      renderTable(links);
    } catch {
      clearToken();
      showLogin('Erro de rede.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  document.getElementById('login-btn').addEventListener('click', attemptLogin);
  document.getElementById('password-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') attemptLogin();
  });
  document.getElementById('logout-btn').addEventListener('click', function() {
    clearToken();
    showLogin();
  });

  // ---- Load & render ----
  async function loadLinks() {
    try {
      const res = await fetch('/api/admin/links', { headers: authHeader() });
      if (res.status === 401) { showLogin('Sessão expirada.'); return; }
      const links = await res.json();
      cachedLinks = links;
      renderTable(links);
    } catch {
      console.error('Erro ao carregar links');
    }
  }

  function makeCell(content) {
    const td = document.createElement('td');
    td.appendChild(content);
    return td;
  }

  function makeBadge(text, classes) {
    const span = document.createElement('span');
    span.className = classes;
    span.textContent = text;
    return span;
  }

  function makeActionBtn(label, classes, handler) {
    const btn = document.createElement('button');
    btn.className = 'btn-sm ' + classes;
    btn.textContent = label;
    btn.addEventListener('click', handler);
    return btn;
  }

  function makeDeleteBtn(id, slug) {
    const NS = 'http://www.w3.org/2000/svg';
    const btn = document.createElement('button');
    btn.className = 'btn-sm btn-delete';
    btn.title = 'Excluir link';

    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('width', '15');
    svg.setAttribute('height', '15');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2.2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');

    function addPath(d) {
      const el = document.createElementNS(NS, 'path');
      el.setAttribute('d', d);
      svg.appendChild(el);
    }
    function addPolyline(points) {
      const el = document.createElementNS(NS, 'polyline');
      el.setAttribute('points', points);
      svg.appendChild(el);
    }

    addPolyline('3 6 5 6 21 6');
    addPath('M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6');
    addPath('M10 11v6');
    addPath('M14 11v6');
    addPath('M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2');

    btn.appendChild(svg);
    btn.addEventListener('click', function() { openConfirmDelete(id, slug); });
    return btn;
  }

  function renderTable(links) {
    const tbody = document.getElementById('links-tbody');
    tbody.replaceChildren();

    if (!links.length) {
      const tr = document.createElement('tr');
      tr.className = 'empty-row';
      const td = document.createElement('td');
      td.setAttribute('colspan', '6');
      td.textContent = 'Nenhum link cadastrado.';
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    links.forEach(function(link) {
      const tr = document.createElement('tr');

      // Slug
      tr.appendChild(makeCell(makeBadge(link.slug, 'slug-badge')));

      // Title
      const titleTd = document.createElement('td');
      titleTd.textContent = link.title;
      tr.appendChild(titleTd);

      // Category
      const catClass = link.category === 'cupom' ? 'cat-badge cat-cupom' : 'cat-badge cat-produto';
      const catLabel = link.category === 'cupom' ? 'Cupom' : 'Produto';
      tr.appendChild(makeCell(makeBadge(catLabel, catClass)));

      // Status
      const statusClass = link.is_active ? 'status-badge status-active' : 'status-badge status-inactive';
      const statusLabel = link.is_active ? 'Ativo' : 'Inativo';
      tr.appendChild(makeCell(makeBadge(statusLabel, statusClass)));

      // Clicks
      const clicksTd = document.createElement('td');
      const clicksSpan = document.createElement('span');
      clicksSpan.className = 'clicks-num';
      clicksSpan.textContent = String(link.clicks);
      clicksTd.appendChild(clicksSpan);
      tr.appendChild(clicksTd);

      // Actions
      const actionsTd = document.createElement('td');
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'actions';

      actionsDiv.appendChild(makeActionBtn('Editar', 'btn-edit', function() {
        openEditModal(link.id);
      }));

      if (link.is_active) {
        actionsDiv.appendChild(makeActionBtn('Desativar', 'btn-deactivate', function(e) {
          toggleActive(link.id, false, e.currentTarget);
        }));
      } else {
        actionsDiv.appendChild(makeActionBtn('Ativar', 'btn-activate', function(e) {
          toggleActive(link.id, true, e.currentTarget);
        }));
      }

      actionsDiv.appendChild(makeDeleteBtn(link.id, link.slug));

      actionsTd.appendChild(actionsDiv);
      tr.appendChild(actionsTd);
      tbody.appendChild(tr);
    });
  }

  // ---- Modal ----
  const modal = document.getElementById('link-modal');

  document.getElementById('new-link-btn').addEventListener('click', openCreateModal);
  document.getElementById('modal-close-btn').addEventListener('click', function() { modal.close(); });
  document.getElementById('modal-cancel-btn').addEventListener('click', function() { modal.close(); });

  function openCreateModal() {
    editingLinkId = null;
    document.getElementById('modal-title').textContent = 'Novo Link';
    document.getElementById('field-slug').value = '';
    document.getElementById('field-slug').disabled = false;
    document.getElementById('field-title').value = '';
    document.getElementById('field-description').value = '';
    document.getElementById('field-url').value = '';
    document.getElementById('field-coupon').value = '';
    document.getElementById('field-category').value = 'produto';
    setIconPicker('');
    document.getElementById('modal-error').textContent = '';
    modal.showModal();
    document.getElementById('field-slug').focus();
  }

  function openEditModal(id) {
    const link = cachedLinks.find(function(l) { return l.id === id; });
    if (!link) return;
    editingLinkId = id;
    document.getElementById('modal-title').textContent = 'Editar Link';
    document.getElementById('field-slug').value = link.slug;
    document.getElementById('field-slug').disabled = true;
    document.getElementById('field-title').value = link.title;
    document.getElementById('field-description').value = link.description || '';
    document.getElementById('field-url').value = link.destination_url;
    document.getElementById('field-coupon').value = link.coupon_code || '';
    document.getElementById('field-category').value = link.category;
    setIconPicker(link.icon || '');
    document.getElementById('modal-error').textContent = '';
    modal.showModal();
    document.getElementById('field-title').focus();
  }

  document.getElementById('modal-save-btn').addEventListener('click', saveLink);

  async function saveLink() {
    const errorEl = document.getElementById('modal-error');
    errorEl.textContent = '';
    const saveBtn = document.getElementById('modal-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Salvando…';

    const title = document.getElementById('field-title').value.trim();
    const description = document.getElementById('field-description').value.trim() || null;
    const destination_url = document.getElementById('field-url').value.trim();
    const coupon_code = document.getElementById('field-coupon').value.trim() || null;
    const icon = document.getElementById('field-icon').value || null;
    const category = document.getElementById('field-category').value;

    if (!title) { errorEl.textContent = 'Título é obrigatório.'; return; }
    if (!destination_url) { errorEl.textContent = 'URL de destino é obrigatória.'; return; }

    let url, method, body;

    if (editingLinkId) {
      url = '/api/admin/links/' + editingLinkId;
      method = 'PUT';
      body = JSON.stringify({ title, description, destination_url, coupon_code, icon, category });
    } else {
      const slug = document.getElementById('field-slug').value.trim();
      if (!slug) { errorEl.textContent = 'Slug é obrigatório.'; return; }
      url = '/api/admin/links';
      method = 'POST';
      body = JSON.stringify({ slug, title, description, destination_url, coupon_code, icon, category });
    }

    try {
      const res = await fetch(url, {
        method,
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()),
        body,
      });
      if (res.status === 400) {
        const data = await res.json();
        errorEl.textContent = data.detail || 'Erro de validação.';
        return;
      }
      if (res.status === 401) { modal.close(); showLogin('Sessão expirada.'); return; }
      if (!res.ok) { errorEl.textContent = 'Erro ao salvar. Tente novamente.'; return; }
      modal.close();
      loadLinks();
    } catch {
      errorEl.textContent = 'Erro de rede.';
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Salvar';
    }
  }

  // ---- Toggle active ----
  async function toggleActive(id, activate, btn) {
    btn.disabled = true;
    btn.textContent = activate ? 'Ativando…' : 'Desativando…';
    try {
      let res;
      if (activate) {
        res = await fetch('/api/admin/links/' + id, {
          method: 'PUT',
          headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()),
          body: JSON.stringify({ is_active: true }),
        });
      } else {
        res = await fetch('/api/admin/links/' + id, {
          method: 'DELETE',
          headers: authHeader(),
        });
      }
      if (res.status === 401) { showLogin('Sessão expirada.'); return; }
      loadLinks();
    } catch {
      console.error('Erro ao alterar status do link');
      btn.disabled = false;
      btn.textContent = activate ? 'Ativar' : 'Desativar';
    }
  }

  // ---- Confirm delete dialog ----
  const confirmDialog = document.getElementById('confirm-dialog');
  let pendingDeleteId = null;

  function openConfirmDelete(id, slug) {
    pendingDeleteId = id;
    document.getElementById('confirm-slug-label').textContent = '/' + slug;
    document.getElementById('confirm-delete-btn').disabled = false;
    document.getElementById('confirm-delete-btn').textContent = 'Excluir';
    confirmDialog.showModal();
  }

  document.getElementById('confirm-cancel-btn').addEventListener('click', function() {
    confirmDialog.close();
  });

  document.getElementById('confirm-delete-btn').addEventListener('click', async function() {
    if (!pendingDeleteId) return;
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Excluindo…';
    try {
      const res = await fetch('/api/admin/links/' + pendingDeleteId + '/hard', {
        method: 'DELETE',
        headers: authHeader(),
      });
      if (res.status === 401) { confirmDialog.close(); showLogin('Sessão expirada.'); return; }
      confirmDialog.close();
      loadLinks();
    } catch {
      btn.disabled = false;
      btn.textContent = 'Excluir';
    }
  });

  // ---- Init ----
  if (sessionStorage.getItem('admin_token')) {
    showAdmin();
    loadLinks().catch(function() { showLogin(); });
  } else {
    showLogin();
  }
</script>
</body>
</html>
